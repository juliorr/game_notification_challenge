server:
  port: 8080

spring:
  application:
    name: notification-service
  threads:
    virtual:
      enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/notifications
    username: notif
    password: notif
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

notifications:
  pagination:
    max-page-size: ${NOTIFICATIONS_MAX_PAGE_SIZE:100}
    default-page-size: ${NOTIFICATIONS_DEFAULT_PAGE_SIZE:20}
  cors:
    allowed-origins: ${NOTIFICATIONS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.globalli.notifications: DEBUG
